version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agoroscores-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agoroscores
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: agoroscores-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
